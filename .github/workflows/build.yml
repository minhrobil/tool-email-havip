name: build

on:
  push:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Install Playwright Chromium
        run: python -m playwright install chromium

      - name: Inject Azure client_id into config.json
        shell: python
        run: |
          import json, pathlib
          cfg = pathlib.Path("config.json")
          data = json.loads(cfg.read_text(encoding="utf-8"))
          data["azure"]["client_id"] = "${{ secrets.AZURE_CLIENT_ID }}"
          cfg.write_text(json.dumps(data, ensure_ascii=False, indent=2), encoding="utf-8")

      - name: Build EXE with PyInstaller
        run: |
          python -m PyInstaller `
            --name ToolXuLyMailCongVan `
            --onedir `
            --windowed `
            --icon NONE `
            --add-data "config.json;." `
            --hidden-import msal `
            --hidden-import msal.authority `
            --hidden-import msal.application `
            --hidden-import fitz `
            --hidden-import openpyxl `
            --hidden-import dateutil `
            --hidden-import dateutil.relativedelta `
            --hidden-import playwright `
            --hidden-import playwright.sync_api `
            --collect-all msal `
            --collect-all playwright `
            run_app.py

      - name: Copy helper files into dist
        run: |
          copy config.json dist\ToolXuLyMailCongVan\config.json
          copy packaging\windows\run_headless.dist.bat dist\ToolXuLyMailCongVan\run_headless.bat
          copy packaging\windows\setup_scheduler.dist.bat dist\ToolXuLyMailCongVan\setup_scheduler.bat

      - name: Bundle Playwright Chromium into dist
        shell: pwsh
        run: |
          $dest = "dist\ToolXuLyMailCongVan\_internal\playwright\driver\package\.local-browsers"
          New-Item -ItemType Directory -Force -Path $dest | Out-Null
          $msPlaywright = "$env:LOCALAPPDATA\ms-playwright"
          $copied = 0
          foreach ($dir in Get-ChildItem $msPlaywright -Directory | Where-Object { $_.Name -like "chromium_headless_shell-*" }) {
            Write-Host "Copying $($dir.Name)..."
            Copy-Item -Path $dir.FullName -Destination "$dest\$($dir.Name)" -Recurse -Force
            $copied++
          }
          if ($copied -eq 0) { Write-Warning "No chromium_headless_shell found in $msPlaywright" }
          else { Write-Host "Chromium bundled OK ($copied folder(s))" }

      - name: Zip dist folder
        run: Compress-Archive -Path dist\ToolXuLyMailCongVan\* -DestinationPath ToolXuLyMailCongVan-windows.zip

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ToolXuLyMailCongVan-windows
          path: ToolXuLyMailCongVan-windows.zip
          retention-days: 30

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ github.run_number }}
          name: Build ${{ github.run_number }}
          files: ToolXuLyMailCongVan-windows.zip
          generate_release_notes: true
